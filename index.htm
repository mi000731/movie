<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>電影票核銷模擬 (純圖片流程)</title>
    
    <!-- 允許將網頁加入主畫面並以全螢幕 (App模式) 執行，隱藏網址列 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#333333">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #333;
            display: flex;
            flex-direction: column; /* 讓內容由上往下排列 */
            align-items: center;    /* 保持水平置中 */
            min-height: 100vh;
            /* 修正行動裝置 100vh 可能包含網址列高度的問題 */
            min-height: -webkit-fill-available;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overscroll-behavior-y: none; /* 防止 Safari 網頁上下回彈效果 */
        }
        
        html {
            height: -webkit-fill-available;
        }

        /* 新增：頂部 70px 空白區域 */
        .top-spacer {
            width: 100%;
            height: 70px;
            flex-shrink: 0; /* 防止被壓縮 */
        }

        /* 手機畫面容器 */
        .phone-container {
            position: relative;
            width: 100%;
            max-width: 430px; /* 模擬手機寬度 */
            aspect-ratio: 1170 / 2532; /* 根據你提供的截圖比例 */
            background-color: #fff;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer; /* 讓整區都有點擊(手指)提示 */
            -webkit-tap-highlight-color: transparent; /* 移除手機點擊時自帶的半透明閃爍 */
            container-type: inline-size; /* 讓內部元素可以根據容器寬度自適應縮放 */
        }

        /* 滿版底圖 (1.jpg / 4.jpg) */
        .base-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* 左上角真實時間區塊 */
        .real-time {
            position: absolute;
            top: 1.3%;       /* 調整以覆蓋原圖的時間位置 */
            left: 5%;        /* 調整以覆蓋原圖的時間位置 */
            width: 15%;
            height: 3.5%;
            background-color: #c7008f; /* 已更新為指定的桃紅色 */
            color: white;
            font-weight: 600;
            font-size: 4.2cqi; /* 根據容器寬度動態調整字體大小 */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5; /* 放在底圖之上，遮罩之下 */
            pointer-events: none; /* 讓點擊能穿透 */
            letter-spacing: 0.5px;
        }

        /* 黑底遮罩特效 */
        .backdrop {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.4);
            opacity: 0;
            transition: opacity 0.2s ease-out;
            z-index: 10;
            pointer-events: none;
        }
        .backdrop.show {
            opacity: 1;
        }

        /* 對話框覆蓋層 (2.png / 3.png) */
        .dialog-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* 確保圖片不變形 */
            z-index: 20;
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none; /* 讓點擊穿透到容器 */
            
            /* 彈出特效設定 */
            opacity: 0;
            transform: scale(1.1);
            transition: opacity 0.2s ease-out, transform 0.2s ease-out;
        }
        
        .dialog-overlay.show {
            opacity: 1;
            transform: scale(1);
        }

        /* 隱藏的全螢幕按鈕 */
        .fullscreen-btn {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 25%;
            height: 12%;
            z-index: 50; /* 確保在最上層 */
            cursor: default; /* 不顯示可點擊的游標以保持隱蔽 */
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

    <!-- 新增：頂部空白區域，用於讓使用者往下拉以隱藏網址列 -->
    <div class="top-spacer"></div>

    <!-- 整個容器都是點擊觸發區 -->
    <div class="phone-container" id="container">
        <!-- 底圖 (初始為 1.jpg，最後變 4.jpg) -->
        <img src="1.jpg" id="mainImage" class="base-image" alt="背景畫面">
        
        <!-- 即時時間覆蓋層 -->
        <div class="real-time" id="timeDisplay">--:--</div>

        <!-- 半透明黑底遮罩 -->
        <div class="backdrop" id="backdrop"></div>
        
        <!-- 對話框 (初始隱藏，出現時為 2.png，按下時為 3.png) -->
        <img src="" id="dialogImage" class="dialog-overlay" alt="對話框">

        <!-- 右下角隱藏全螢幕按鈕 -->
        <div class="fullscreen-btn" id="fullscreenBtn"></div>
    </div>

    <script>
        const container = document.getElementById('container');
        const mainImage = document.getElementById('mainImage');
        const dialogImage = document.getElementById('dialogImage');
        const backdrop = document.getElementById('backdrop');
        const timeDisplay = document.getElementById('timeDisplay');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        
        // 預先載入圖片，避免點擊瞬間圖片還沒下載完造成閃爍
        const img3 = new Image(); img3.src = '3.png';
        const img4 = new Image(); img4.src = '4.jpg';
        
        // --- 真實時間更新邏輯 ---
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            timeDisplay.textContent = `${hours}:${minutes}`;
        }
        
        // 初始化時間並設定每秒更新 (1000 毫秒)
        updateTime();
        setInterval(updateTime, 1000);
        // -----------------------

        // --- 全螢幕控制邏輯 ---
        fullscreenBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // 阻止點擊事件傳遞到 container，避免觸發核銷流程
            
            const docEl = document.documentElement; // 讓整個網頁進入全螢幕，保持黑色背景
            
            if (!document.fullscreenElement) {
                if (docEl.requestFullscreen) {
                    docEl.requestFullscreen();
                } else if (docEl.webkitRequestFullscreen) { /* Safari */
                    docEl.webkitRequestFullscreen();
                } else if (docEl.msRequestFullscreen) { /* IE11 */
                    docEl.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });
        // -----------------------

        // 狀態變數：紀錄目前進行到哪一步
        // 0: 初始畫面 (只有 1.jpg)
        // 1: 顯示對話框 (1.jpg + 疊加 2.png)
        // 2: 點擊對話框狀態 (1.jpg + 疊加 3.png) -> 隨後自動跳轉到完成畫面 (4.jpg)
        // 3: 流程結束 (只有 4.jpg)
        let currentStep = 0;

        // 監聽整個手機畫面容器的點擊事件
        container.addEventListener('click', () => {
            if (currentStep === 0) {
                // 【第 1 次點擊】
                dialogImage.src = '2.png';
                backdrop.classList.add('show');      // 觸發背景漸暗特效
                dialogImage.classList.add('show');   // 觸發對話框彈出特效
                currentStep = 1;
            } 
            else if (currentStep === 1) {
                // 【第 2 次點擊】
                dialogImage.src = '3.png';
                currentStep = 2;

                // 延遲 0.2 秒 (200毫秒)，讓使用者有看到「按下」狀態(3.png)的視覺回饋
                setTimeout(() => {
                    backdrop.classList.remove('show');    // 背景漸亮
                    dialogImage.classList.remove('show'); // 對話框縮放淡出
                    
                    // 等待對話框特效消失 (0.2秒) 後再換底圖，過渡會更自然
                    setTimeout(() => {
                        mainImage.src = '4.jpg';          // 底圖換成完成圖
                        currentStep = 3;                  // 流程結束
                    }, 200); 
                }, 200); 
            }
            // 如果 currentStep 是 3 (已經結束)，就不再做任何動作
        });
    </script>

</body>
</html>
